<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>RGB LED-Streifen Simulation</title>
  <style>
    :root { font-family: system-ui, sans-serif; color: #172033; background: #eef2f7; }
    * { box-sizing: border-box; }
    body { margin: 0; background: #eef2f7; color: #172033; }
    main { display: grid; grid-template-columns: 420px 1fr; min-height: 100vh; }
    aside, section { padding: 18px; }
    aside { background: #182235; color: #f8fafc; }
    h1 { font-size: 22px; margin: 0 0 18px; }
    h2 { font-size: 18px; margin: 0 0 12px; }
    h3 { font-size: 15px; margin: 18px 0 8px; }
    button, input, select { font: inherit; }
    button { border: 0; border-radius: 7px; padding: 9px 11px; font-weight: 700; cursor: pointer; background: #dbe4f0; color: #172033; }
    button.primary { background: #22c55e; color: #052e16; }
    button.danger { background: #f97316; color: #431407; }
    button.ghost { background: #2a3650; color: #f8fafc; }
    button.icon { width: 36px; height: 36px; padding: 0; }
    input, select { width: 100%; border: 1px solid #cbd5e1; border-radius: 7px; padding: 9px; background: #fff; color: #172033; }
    aside input, aside select { border-color: #475569; }
    .seq-list { display: grid; gap: 8px; }
    .seq-item { display: grid; grid-template-columns: 1fr auto; gap: 6px; align-items: center; padding: 10px; border-radius: 8px; background: #26334b; color: #f8fafc; cursor: pointer; }
    .seq-item.active { outline: 3px solid #38bdf8; background: #31415d; }
    .seq-meta { color: #cbd5e1; font-size: 13px; margin-top: 3px; }
    .row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
    .sidebar-row { display: flex; gap: 8px; align-items: center; flex-wrap: nowrap; }
    .sidebar-row button { flex: 1 1 0; padding-left: 8px; padding-right: 8px; }
    .sidebar-panel { margin-bottom: 18px; }
    .sidebar-panel label { display: block; margin-bottom: 8px; }
    .check-row { display: flex !important; align-items: center; gap: 8px; }
    .check-row input { width: 22px; }
    .panel { background: #fff; border: 1px solid #d7dee8; border-radius: 8px; padding: 16px; margin-bottom: 16px; }
    .strip { display: grid; grid-template-columns: repeat(auto-fill, minmax(30px, 1fr)); gap: 8px; max-height: 270px; overflow: auto; padding: 10px; background: #0f172a; border-radius: 8px; }
    .pixel { aspect-ratio: 1; border-radius: 50%; background: #1f2937; border: 2px solid #334155; color: #94a3b8; display: grid; place-items: center; font-size: 11px; font-weight: 800; }
    .pixel.on { color: #fff; border-color: rgba(255,255,255,.78); box-shadow: 0 0 14px currentColor; }
    .led-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(46px, 1fr)); gap: 8px; max-height: 300px; overflow: auto; padding: 2px; }
    .led-btn { min-height: 42px; border: 2px solid #cbd5e1; background: #f8fafc; }
    .led-btn.on { color: #fff; border-color: #111827; }
    .steps { display: grid; gap: 8px; }
    .step { display: grid; grid-template-columns: 1fr auto repeat(5, auto); gap: 8px; align-items: center; padding: 10px; background: #f8fafc; border: 1px solid #d7dee8; border-radius: 8px; }
    .step.active { outline: 3px solid #38bdf8; }
    .effects { display: grid; gap: 8px; }
    .group-list { display: grid; gap: 6px; margin: 10px 0 18px; }
    .group-item { display: grid; grid-template-columns: 1fr auto auto; gap: 8px; align-items: center; padding: 8px 10px; background: #f8fafc; border: 1px solid #d7dee8; border-radius: 8px; }
    .step-toolbar { margin-bottom: 14px; padding-bottom: 14px; border-bottom: 1px solid #d7dee8; }
    .effect { display: grid; grid-template-columns: 1fr auto; gap: 8px; align-items: center; padding: 9px; background: #f8fafc; border: 1px solid #d7dee8; border-radius: 8px; }
    .status { min-height: 24px; color: #166534; font-weight: 800; }
    .muted { color: #64748b; font-size: 14px; }
    .swatch { display: inline-block; width: 18px; height: 18px; border-radius: 4px; border: 1px solid #475569; vertical-align: middle; margin-right: 6px; }
    @media (max-width: 980px) { main { grid-template-columns: 1fr; } aside { order: 1; } section { order: 2; } }
  </style>
</head>
<body>
<main>
  <aside>
    <h1>RGB Simulation</h1>

    <div class="sidebar-panel">
      <h3>Geraet</h3>
      <label>Name / WLAN
        <input id="deviceNameInput" maxlength="31" value="RGB-Sequencer">
      </label>
      <button class="ghost" onclick="applyDeviceName()">Name uebernehmen</button>
      <label>Kennwort
        <input id="apPasswordInput" type="text" minlength="8" maxlength="63" value="12345678">
      </label>
      <label>Kennwort wiederholen
        <input id="apPasswordConfirmInput" type="text" minlength="8" maxlength="63" value="12345678">
      </label>
      <button class="ghost" onclick="applyPassword()">Kennwort uebernehmen</button>
    </div>

    <div class="seq-list" id="sequenceList"></div>
    <h3>Playlist</h3>
    <div class="sidebar-row">
      <button class="ghost" onclick="addSequence()">Neu</button>
      <button class="ghost" onclick="moveSequence(-1)">Hoch</button>
      <button class="ghost" onclick="moveSequence(1)">Runter</button>
      <button class="danger" onclick="deleteSequence()">Loeschen</button>
    </div>
    <div class="sidebar-panel">
      <label>Sequenzname<input id="seqName" oninput="updateSequenceMeta()"></label>
      <label class="check-row"><input id="seqEnabled" type="checkbox" onchange="updateSequenceMeta()"> Aktiv</label>
      <label class="check-row"><input id="seqAutoDuration" type="checkbox" onchange="updateSequenceMeta()"> Dauer aus Schritten berechnen</label>
      <label>Dauer Sekunden<input id="seqDuration" type="number" min="0.1" step="0.1" oninput="updateSequenceMeta()"></label>
      <div id="seqDurationInfo" class="seq-meta"></div>
    </div>
  </aside>

  <section>
    <div class="panel">
      <h2>Simulierter LED-Streifen</h2>
      <div class="strip" id="strip"></div>
    </div>

    <div class="panel">
      <h2>LEDs, Farben und Gruppen</h2>
      <div class="row" style="margin-bottom: 12px">
        <label style="width: 150px">Anzahl LEDs<input id="ledCountInput" type="number" min="1" max="50" value="50" onchange="changeLedCount()"></label>
        <label style="width: 120px">Farbe
          <input id="stepColor" type="color" value="#ff0000" oninput="liveCurrentStep()">
        </label>
        <label style="width: 150px">Helligkeit %
          <input id="ledBrightness" type="number" min="0" max="100" step="1" value="100">
        </label>
        <button onclick="paintAll()">Alle setzen</button>
        <button onclick="clearPaint()">Alle aus</button>
      </div>
      <div class="led-grid" id="ledGrid"></div>
      <h3>Benannte LED-Gruppen</h3>
      <div class="row">
        <label style="flex:1 1 180px">Gruppenname<input id="ledGroupName" maxlength="24"></label>
        <label style="flex:1 1 220px">LEDs<input id="ledGroupSelection" placeholder="1-4,8"></label>
        <button onclick="useCurrentLedsForGroup()">Aktuelle LEDs</button>
        <button onclick="saveLedGroup()">Gruppe speichern</button>
      </div>
      <div id="ledGroupList" class="group-list"></div>
    </div>

    <div class="panel">
      <h2>Effekt fuer LED-Gruppe</h2>
      <div class="row">
        <label style="width:220px">LED-Gruppe
          <select id="effectGroupSelect" onchange="selectEffectGroup()"><option value="">Eigene LED-Auswahl</option></select>
        </label>
        <label style="width:180px">LEDs
          <input id="effectLeds" value="1-20">
        </label>
        <label style="width: 180px">Effekt
          <select id="effectType">
            <option value="fire">Feuerflackern</option>
            <option value="storm">Gewitter</option>
            <option value="rainbow">Regenbogen</option>
            <option value="welder">Schweisserlicht</option>
            <option value="camera">Fotografen-Blitz</option>
            <option value="police">Polizei-Blitzer</option>
            <option value="sparkle">Funkeln</option>
            <option value="comet">Komet</option>
            <option value="theater">Theater-Lauflicht</option>
            <option value="pulse">Pulsieren</option>
            <option value="breathe">Atmen</option>
            <option value="lava">Lava</option>
            <option value="randomOnOff">Zufall An/Aus</option>
            <option value="randomColor">Zufall Farbe</option>
            <option value="randomOnOffColor">Zufall An/Aus + Farbe</option>
            <option value="meteor">Meteor</option>
            <option value="twinkle">Sternfunkeln</option>
            <option value="candle">Kerze</option>
            <option value="sunrise">Sonnenaufgang</option>
            <option value="sunset">Sonnenuntergang</option>
            <option value="scanner">Scanner</option>
            <option value="confetti">Konfetti</option>
            <option value="aurora">Aurora</option>
            <option value="toxic">Giftgruen</option>
            <option value="heartbeat">Herzschlag</option>
            <option value="fadeIn">Fade-In</option>
            <option value="fadeOut">Fade-Out</option>
            <option value="transition">Farbuebergang</option>
            <option value="blink">Blinklicht</option>
            <option value="running">Lauflicht</option>
          </select>
        </label>
        <label style="width: 150px">Geschwindigkeit 0-100
          <input id="effectSpeed" type="number" min="0" max="100" step="1" value="50">
        </label>
        <label style="width: 120px">Effektfarbe
          <input id="effectColor" type="color" value="#ffffff">
        </label>
        <label style="width: 160px">Helligkeit %
          <input id="effectBrightness" type="number" min="0" max="100" step="1" value="100">
        </label>
        <button onclick="addEffect()">Effekt hinzufuegen</button>
      </div>
      <div class="effects" id="effects"></div>
    </div>

    <div class="panel">
      <h2>Schritte dieser Sequenz</h2>
      <div class="row step-toolbar">
        <label style="flex:1 1 200px">Schrittname<input id="stepName" oninput="liveCurrentStep()"></label>
        <label style="width:160px">Dauer Sekunden<input id="stepSeconds" type="number" min="0.02" step="0.1" value="1" oninput="liveCurrentStep()"></label>
        <label style="width:190px">Zufallsdauer bis<input id="stepRandomSeconds" type="number" min="0" max="60" step="0.1" value="0" oninput="liveCurrentStep()"></label>
        <label style="width:170px">Gesamthelligkeit %<input id="stepBrightness" type="number" min="0" max="100" step="1" value="100" oninput="liveCurrentStep()"></label>
        <button class="primary" onclick="saveStep()">Schritt speichern</button>
        <button onclick="newStep()">Neuer Schritt</button>
        <button onclick="pasteStep()">Einfuegen</button>
      </div>
      <div class="steps" id="steps"></div>
    </div>
  </section>

  <section>
    <div class="panel">
      <h2>Simulation</h2>
      <div class="row">
        <button class="primary" onclick="play()">Abspielen</button>
        <button onclick="stop()">Stop</button>
        <button onclick="saveLocal()">Speichern</button>
      </div>
      <p id="status" class="status"></p>
      <p class="muted">Diese Datei simuliert die Wemos-Weboberflaeche lokal im Browser. Deine Daten werden nur im Browser gespeichert.</p>
    </div>
  </section>
</main>

<script>
const MAX_LEDS = 50;
let deviceName = 'RGB-Sequencer';
let ledCount = 50;
let playlist = [];
let ledGroups = [];
let selectedSequence = 0;
let selectedStep = -1;
let paintedColors = new Map();
let currentEffects = [];
let copiedStep = null;

const sequenceList = document.getElementById('sequenceList');
const ledGrid = document.getElementById('ledGrid');
const strip = document.getElementById('strip');
const stepsEl = document.getElementById('steps');
const effectsEl = document.getElementById('effects');
const seqName = document.getElementById('seqName');
const seqDuration = document.getElementById('seqDuration');
const seqEnabled = document.getElementById('seqEnabled');
const seqAutoDuration = document.getElementById('seqAutoDuration');
const seqDurationInfo = document.getElementById('seqDurationInfo');
const stepName = document.getElementById('stepName');
const stepSeconds = document.getElementById('stepSeconds');
const stepRandomSeconds = document.getElementById('stepRandomSeconds');
const stepBrightness = document.getElementById('stepBrightness');
const stepColor = document.getElementById('stepColor');
const ledBrightness = document.getElementById('ledBrightness');
const effectLeds = document.getElementById('effectLeds');
const effectGroupSelect = document.getElementById('effectGroupSelect');
const effectType = document.getElementById('effectType');
const effectSpeed = document.getElementById('effectSpeed');
const effectColor = document.getElementById('effectColor');
const effectBrightness = document.getElementById('effectBrightness');
const statusEl = document.getElementById('status');
const deviceNameInput = document.getElementById('deviceNameInput');
const apPasswordInput = document.getElementById('apPasswordInput');
const apPasswordConfirmInput = document.getElementById('apPasswordConfirmInput');
const ledCountInput = document.getElementById('ledCountInput');
const ledGroupName = document.getElementById('ledGroupName');
const ledGroupSelection = document.getElementById('ledGroupSelection');
const ledGroupList = document.getElementById('ledGroupList');
let apPassword = '12345678';

const EFFECT_TYPES = ['fire', 'storm', 'rainbow', 'welder', 'camera', 'police', 'sparkle', 'comet', 'theater', 'pulse', 'breathe', 'lava', 'randomOnOff', 'randomColor', 'randomOnOffColor', 'meteor', 'twinkle', 'candle', 'sunrise', 'sunset', 'scanner', 'confetti', 'aurora', 'toxic', 'heartbeat', 'fadeIn', 'fadeOut', 'transition', 'blink', 'running'];

function defaultPlaylist() {
  return [
    { name: 'Demo_Sequenz', durationMs: 304000, enabled: true, autoDuration: false, steps: [
      { name: 'Weiss', durationMs: 7000, randomMaxMs: 0, groups: [{ leds: '1', color: '#ffffff' }], effects: [] },
      { name: 'Pause', durationMs: 2000, randomMaxMs: 0, groups: [], effects: [] },
      { name: 'Rot', durationMs: 7000, randomMaxMs: 0, groups: [{ leds: '1', color: '#ff0000' }], effects: [] },
      { name: 'Pause', durationMs: 2000, randomMaxMs: 0, groups: [], effects: [] },
      { name: 'Gruen', durationMs: 7000, randomMaxMs: 0, groups: [{ leds: '1', color: '#00ff00' }], effects: [] },
      { name: 'Pause', durationMs: 2000, randomMaxMs: 0, groups: [], effects: [] },
      { name: 'Blau', durationMs: 7000, randomMaxMs: 0, groups: [{ leds: '1', color: '#0000ff' }], effects: [] },
      { name: 'Pause', durationMs: 2000, randomMaxMs: 0, groups: [], effects: [] },
      ...EFFECT_TYPES.flatMap((type, index) => {
        const step = { name: effectName(type), durationMs: 7000, randomMaxMs: 0, groups: [], effects: [{ leds: '1', type, speed: 50, brightness: 1, color: '#ffffff' }] };
        return index === EFFECT_TYPES.length - 1 ? [step] : [step, { name: 'Pause', durationMs: 2000, randomMaxMs: 0, groups: [], effects: [] }];
      })
    ] }
  ];
}

function ensureDemoSequenceInPlaylist(list) {
  if (!Array.isArray(list) || !list.length) return defaultPlaylist();
  const existingDemo = list.find(seq => seq.name === 'Demo_Sequenz');
  const demoEnabled = existingDemo ? existingDemo.enabled !== false : true;
  list = list.filter(seq => seq.name !== 'Demo_Sequenz');
  list.unshift({ ...defaultPlaylist()[0], enabled: demoEnabled });
  return list;
}

function normalizeStep(step) {
  const normalized = Array.isArray(step.groups)
    ? { ...step }
    : { durationMs: step.durationMs || 1000, groups: [{ leds: step.leds || '', color: step.color || '#ff0000' }], effects: [] };
  normalized.name = String(normalized.name || '');
  normalized.randomMaxMs = Number(normalized.randomMaxMs || 0);
  normalized.brightness = clamp(Number(normalized.brightness ?? 100), 0, 100);
  normalized.groups = (normalized.groups || []).map(group => ({ ...group, brightness: clamp(Number(group.brightness ?? 1), 0, 1) }));
  if (!Array.isArray(normalized.effects)) normalized.effects = [];
  normalized.effects = normalized.effects.map(effect => ({ ...effect, speed: clamp(Number(effect.speed ?? 50), 0, 100), brightness: clamp(Number(effect.brightness ?? 1), 0, 1), color: effect.color || '#ffffff' }));
  return normalized;
}

function stepText(step) {
  step = normalizeStep(step);
  if (!Array.isArray(step.effects)) step.effects = [];
  const colors = step.groups.map(group => `${group.color} ${Math.round((group.brightness ?? 1) * 100)}% LEDs ${group.leds || 'keine'}`);
  const effects = step.effects.map(effect => `${effectName(effect.type)} LEDs ${effect.leds} Speed ${effect.speed ?? 50}${usesEffectColor(effect.type) ? ` ${effect.color || '#ffffff'}` : ''}`);
  const randomText = step.randomMaxMs > 0 ? `Zufallsdauer bis ${msToSeconds(step.randomMaxMs)} s` : '';
  return [`Gesamt ${step.brightness}%`, ...colors, ...effects, randomText].filter(Boolean).join(' / ');
}

function stepTitle(step, index) {
  step = normalizeStep(step);
  return step.name || `Schritt ${index + 1}`;
}

function mapFromGroups(groups) {
  const colors = new Map();
  for (const group of groups) {
    for (const led of expandSelection(group.leds)) colors.set(led, { color: group.color.toLowerCase(), brightness: clamp(Number(group.brightness ?? 1), 0, 1) });
  }
  return colors;
}

function groupsFromMap(colors) {
  const byColor = new Map();
  for (const [led, paint] of colors) {
    const value = typeof paint === 'string' ? { color: paint, brightness: 1 } : paint;
    const key = `${value.color}|${clamp(Number(value.brightness ?? 1), 0, 1)}`;
    if (!byColor.has(key)) byColor.set(key, []);
    byColor.get(key).push(led);
  }
  return [...byColor.entries()].map(([key, leds]) => {
    const [color, brightness] = key.split('|');
    return { color, brightness: Number(brightness), leds: compactNumbers(leds) };
  });
}

function effectName(type) {
  return ({
    fire: 'Feuerflackern',
    storm: 'Gewitter',
    rainbow: 'Regenbogen',
    welder: 'Schweisserlicht',
    camera: 'Fotografen-Blitz',
    police: 'Polizei-Blitzer',
    sparkle: 'Funkeln',
    comet: 'Komet',
    theater: 'Theater-Lauflicht',
    pulse: 'Pulsieren',
    breathe: 'Atmen',
    lava: 'Lava',
    randomOnOff: 'Zufall An/Aus',
    randomColor: 'Zufall Farbe',
    randomOnOffColor: 'Zufall An/Aus + Farbe',
    meteor: 'Meteor',
    twinkle: 'Sternfunkeln',
    candle: 'Kerze',
    sunrise: 'Sonnenaufgang',
    sunset: 'Sonnenuntergang',
    scanner: 'Scanner',
    confetti: 'Konfetti',
    aurora: 'Aurora',
    toxic: 'Giftgruen',
    heartbeat: 'Herzschlag',
    fadeIn: 'Fade-In',
    fadeOut: 'Fade-Out',
    transition: 'Farbuebergang',
    blink: 'Blinklicht',
    running: 'Lauflicht'
  })[type] || type;
}

function usesEffectColor(type) {
  return ['sparkle', 'comet', 'theater', 'pulse', 'breathe', 'randomOnOff', 'meteor', 'twinkle', 'scanner', 'heartbeat', 'fadeIn', 'fadeOut', 'transition', 'blink', 'running'].includes(type);
}

function render() {
  deviceNameInput.value = normalizeDeviceName(deviceName);
  apPasswordInput.value = normalizePassword(apPassword);
  apPasswordConfirmInput.value = normalizePassword(apPassword);
  ledCountInput.value = ledCount;
  selectedSequence = clamp(selectedSequence, 0, playlist.length - 1);
  const seq = playlist[selectedSequence];
  if (selectedStep >= seq.steps.length) selectedStep = seq.steps.length - 1;

  sequenceList.innerHTML = '';
  playlist.forEach((item, index) => {
    const el = document.createElement('div');
    el.className = `seq-item ${index === selectedSequence ? 'active' : ''}`;
    el.onclick = () => selectSequence(index);
    const state = item.enabled === false ? 'inaktiv' : 'aktiv';
    const duration = item.autoDuration ? sequenceStepDuration(item) : item.durationMs;
    el.innerHTML = `<div><strong>${escapeHtml(item.name || 'Sequenz')}</strong><div class="seq-meta">${state}, ${msToSeconds(duration)} s, ${item.steps.length} Schritte</div></div><div>${index + 1}</div>`;
    sequenceList.appendChild(el);
  });

  seqName.value = seq.name || '';
  const calculatedDuration = sequenceStepDuration(seq);
  seqDuration.value = msToSeconds(seq.autoDuration ? calculatedDuration : seq.durationMs);
  seqEnabled.checked = seq.enabled !== false;
  seqAutoDuration.checked = seq.autoDuration === true;
  seqDuration.disabled = seq.autoDuration === true;
  seqDurationInfo.textContent = seq.autoDuration ? `Summe der Schritte: ${msToSeconds(calculatedDuration)} s` : '';
  renderLedGroups();
  renderLedGrid();
  renderStrip();
  renderEffects();
  renderSteps();
  updateEditAnimation();
}

function normalizeDeviceName(name) {
  name = String(name || 'RGB-Sequencer').trim();
  if (!name) name = 'RGB-Sequencer';
  return name.slice(0, 31);
}

function normalizePassword(password) {
  password = String(password || '12345678').trim();
  if (password.length < 8) password = '12345678';
  return password.slice(0, 63);
}

function applyDeviceName() {
  deviceName = normalizeDeviceName(deviceNameInput.value);
  deviceNameInput.value = deviceName;
  statusEl.textContent = 'WLAN-Name uebernommen. Zum Anwenden speichern.';
}

function applyPassword() {
  const first = String(apPasswordInput.value || '').trim();
  const second = String(apPasswordConfirmInput.value || '').trim();
  if (first.length < 8) {
    statusEl.textContent = 'Kennwort muss mindestens 8 Zeichen haben.';
    return;
  }
  if (first !== second) {
    statusEl.textContent = 'Kennwoerter stimmen nicht ueberein.';
    return;
  }
  apPassword = normalizePassword(first);
  apPasswordInput.value = apPassword;
  apPasswordConfirmInput.value = apPassword;
  statusEl.textContent = 'Kennwort uebernommen. Zum Anwenden speichern.';
}

function colorMapFromGroups(groups) {
  const colors = new Map();
  for (const group of groups) {
    for (const led of expandSelection(group.leds)) colors.set(led, scaleHexColor(group.color, (group.brightness ?? 1)));
  }
  return colors;
}

function renderStrip(step = currentStepDraft()) {
  step = normalizeStep(step);
  const colors = colorMapFromGroups(step.groups);
  for (const effect of step.effects || []) {
    const marker = scaleHexColor(usesEffectColor(effect.type) ? (effect.color || '#ffffff') : '#38bdf8', effect.brightness ?? 1);
    for (const led of expandSelection(effect.leds)) colors.set(led, marker);
  }
  strip.innerHTML = '';
  for (let i = 1; i <= ledCount; i++) {
    const pixel = document.createElement('div');
    const color = colors.get(i);
    pixel.className = `pixel ${color ? 'on' : ''}`;
    pixel.textContent = i;
    if (color) {
      pixel.style.background = scaleHexColor(color, (step.brightness ?? 100) / 100);
      pixel.style.color = scaleHexColor(color, (step.brightness ?? 100) / 100);
    }
    strip.appendChild(pixel);
  }
}

function updateEditAnimation() {
  renderStrip();
}

function currentStepDraft() {
  return { name: stepName.value.trim(), durationMs: secondsToMs(stepSeconds.value, 1), randomMaxMs: secondsToOptionalMs(stepRandomSeconds.value), brightness: clamp(readNumber(stepBrightness.value, 100), 0, 100), groups: groupsFromMap(paintedColors), effects: currentEffects };
}

function renderLedGrid() {
  ledGrid.innerHTML = '';
  for (let i = 1; i <= ledCount; i++) {
    const button = document.createElement('button');
    const paint = paintedColors.get(i);
    button.className = `led-btn ${paint ? 'on' : ''}`;
    button.textContent = i;
    if (paint) button.style.background = scaleHexColor(paint.color, paint.brightness);
    button.onclick = () => toggleLed(i);
    ledGrid.appendChild(button);
  }
}

function renderSteps() {
  const seq = playlist[selectedSequence];
  stepsEl.innerHTML = '';
  seq.steps.forEach((step, index) => {
    step = normalizeStep(step);
    const row = document.createElement('div');
    row.className = `step ${index === selectedStep ? 'active' : ''}`;
    row.onclick = () => loadStep(index);
    row.innerHTML = `
      <div><strong>${escapeHtml(stepTitle(step, index))}</strong><div class="muted">${escapeHtml(stepText(step))}</div></div>
      <div>${msToSeconds(step.durationMs)} s</div>
      <button class="icon" onclick="event.stopPropagation(); copyStep(${index})">⧉</button>
      <button class="icon" onclick="event.stopPropagation(); pasteStep(${index})">＋</button>
      <button class="icon" onclick="event.stopPropagation(); moveStep(${index}, -1)">↑</button>
      <button class="icon" onclick="event.stopPropagation(); moveStep(${index}, 1)">↓</button>
      <button class="danger" onclick="event.stopPropagation(); deleteStep(${index})">X</button>`;
    stepsEl.appendChild(row);
  });
}

function renderEffects() {
  effectsEl.innerHTML = '';
  if (!currentEffects.length) {
    effectsEl.innerHTML = '<div class="muted">Noch kein Effekt im aktuellen Schritt.</div>';
    return;
  }
  currentEffects.forEach((effect, index) => {
    const row = document.createElement('div');
    row.className = 'effect';
    const colorText = usesEffectColor(effect.type) ? `, Farbe ${effect.color || '#ffffff'}` : '';
    const colorInput = usesEffectColor(effect.type) ? `<input type="color" value="${effect.color || '#ffffff'}" oninput="updateEffectColor(${index}, this.value)">` : '';
    row.innerHTML = `<div><strong>${effectName(effect.type)}</strong><div class="muted">LEDs ${escapeHtml(effect.leds || 'keine')}${colorText}</div></div><label class="muted">Speed 0-100 <input type="number" min="0" max="100" value="${effect.speed ?? 50}" oninput="updateEffectSpeed(${index}, this.value)"></label><label class="muted">Helligkeit % <input type="number" min="0" max="100" value="${Math.round((effect.brightness ?? 1) * 100)}" oninput="updateEffectBrightness(${index}, this.value)"></label>${colorInput}<button class="danger" onclick="deleteEffect(${index})">X</button>`;
    effectsEl.appendChild(row);
  });
}

function selectSequence(index) {
  saveCurrentStepDraft();
  stop();
  selectedSequence = index;
  selectedStep = -1;
  paintedColors.clear();
  currentEffects = [];
  render();
}

function changeLedCount() {
  ledCount = clamp(parseInt(ledCountInput.value, 10) || 50, 1, MAX_LEDS);
  paintedColors = new Map([...paintedColors].filter(([led]) => led <= ledCount));
  currentEffects = currentEffects.map(effect => ledGroups.some(group => group.name.toLowerCase() === String(effect.leds).toLowerCase()) ? effect : ({ ...effect, leds: compactNumbers([...expandSelection(effect.leds)].filter(led => led <= ledCount)) }));
  render();
}

function syncCurrentSequenceMeta() {
  const seq = playlist[selectedSequence];
  if (!seq) return;
  seq.name = seqName.value;
  seq.autoDuration = seqAutoDuration.checked;
  seq.durationMs = seq.autoDuration ? sequenceStepDuration(seq) : secondsToMs(seqDuration.value, 10);
  seq.enabled = seqEnabled.checked;
}

function updateSequenceMeta() {
  syncCurrentSequenceMeta();
  render();
}

function sequenceStepDuration(seq) {
  return Math.max(100, (seq.steps || []).reduce((sum, step) => sum + (Number(step.randomMaxMs) > 0 ? Number(step.randomMaxMs) : Number(step.durationMs || 0)), 0));
}

function renderLedGroups() {
  ledGroupList.innerHTML = '';
  const selectedGroup = effectGroupSelect.value;
  effectGroupSelect.innerHTML = '<option value="">Eigene LED-Auswahl</option>';
  ledGroups.forEach((group, index) => {
    const option = document.createElement('option'); option.value = group.name; option.textContent = `${group.name} (${group.leds})`; effectGroupSelect.appendChild(option);
    const row = document.createElement('div'); row.className = 'group-item';
    row.innerHTML = `<div><strong>${escapeHtml(group.name)}</strong><div class="muted">LEDs ${escapeHtml(group.leds)}</div></div><button onclick="applyLedGroup(${index})">Waehlen</button><button class="danger" onclick="deleteLedGroup(${index})">X</button>`;
    ledGroupList.appendChild(row);
  });
  if (ledGroups.some(group => group.name === selectedGroup)) effectGroupSelect.value = selectedGroup;
  if (!ledGroups.length) ledGroupList.innerHTML = '<div class="muted">Noch keine LED-Gruppe gespeichert.</div>';
}

function selectEffectGroup() { if (effectGroupSelect.value) effectLeds.value = effectGroupSelect.value; }

function useCurrentLedsForGroup() { ledGroupSelection.value = compactNumbers([...paintedColors.keys()]); }
function saveLedGroup() {
  const name = ledGroupName.value.trim().slice(0, 24);
  const leds = compactNumbers([...expandNumericSelection(ledGroupSelection.value)]);
  if (!name || !leds) return;
  const index = ledGroups.findIndex(group => group.name.toLowerCase() === name.toLowerCase());
  if (index >= 0) ledGroups[index] = { name, leds }; else ledGroups.push({ name, leds });
  ledGroupName.value = ''; ledGroupSelection.value = ''; renderLedGroups();
}
function applyLedGroup(index) {
  const group = ledGroups[index]; if (!group) return;
  const paint = { color: stepColor.value.toLowerCase(), brightness: clamp(readNumber(ledBrightness.value, 100) / 100, 0, 1) };
  for (const led of expandNumericSelection(group.leds)) paintedColors.set(led, paint);
  renderLedGrid(); renderStrip();
}
function deleteLedGroup(index) { ledGroups.splice(index, 1); renderLedGroups(); }

function toggleLed(index) {
  const color = stepColor.value.toLowerCase();
  const brightness = clamp(readNumber(ledBrightness.value, 100) / 100, 0, 1);
  const current = paintedColors.get(index);
  if (current && current.color === color && Math.abs(current.brightness - brightness) < 0.001) paintedColors.delete(index);
  else paintedColors.set(index, { color, brightness });
  renderLedGrid();
  renderStrip();
}

function paintAll() {
  const color = stepColor.value.toLowerCase();
  const brightness = clamp(readNumber(ledBrightness.value, 100) / 100, 0, 1);
  for (let i = 1; i <= ledCount; i++) paintedColors.set(i, { color, brightness });
  renderLedGrid();
  renderStrip();
}

function clearPaint() {
  paintedColors.clear();
  renderLedGrid();
  renderStrip();
}

function liveCurrentStep() {
  // Changing the color input only changes the brush, not already painted LEDs.
  renderStrip();
}

function newStep() {
  saveCurrentStepDraft();
  stop();
  const seq = playlist[selectedSequence];
  const insertAt = selectedStep >= 0 ? selectedStep + 1 : seq.steps.length;
  seq.steps.splice(insertAt, 0, { durationMs: 1000, randomMaxMs: 0, brightness: 100, groups: [], effects: [] });
  loadStep(insertAt);
  statusEl.textContent = `Neuer Schritt ${insertAt + 1} angelegt`;
}

function saveStep() {
  saveCurrentStepDraft(true);
  render();
}

function saveCurrentStepDraft(createIfMissing = false) {
  const seq = playlist[selectedSequence];
  if (!seq) return;
  const step = { name: stepName.value.trim(), durationMs: secondsToMs(stepSeconds.value, 1), randomMaxMs: secondsToOptionalMs(stepRandomSeconds.value), brightness: clamp(readNumber(stepBrightness.value, 100), 0, 100), groups: groupsFromMap(paintedColors), effects: currentEffects.map(effect => ({ ...effect })) };
  if (selectedStep >= 0) seq.steps[selectedStep] = step;
  else if (createIfMissing) {
    seq.steps.push(step);
    selectedStep = seq.steps.length - 1;
  }
  if (seq.autoDuration) seq.durationMs = sequenceStepDuration(seq);
}

function loadStep(index) {
  if (index !== selectedStep) saveCurrentStepDraft();
  stop();
  const step = normalizeStep(playlist[selectedSequence].steps[index]);
  selectedStep = index;
  paintedColors = mapFromGroups(step.groups);
  currentEffects = Array.isArray(step.effects) ? step.effects.map(effect => ({ ...effect })) : [];
  stepName.value = step.name || '';
  stepColor.value = step.groups[0]?.color || '#ff0000';
  ledBrightness.value = Math.round((step.groups[0]?.brightness ?? 1) * 100);
  stepSeconds.value = msToSeconds(step.durationMs);
  stepRandomSeconds.value = msToSeconds(step.randomMaxMs || 0);
  stepBrightness.value = step.brightness;
  render();
}

function addEffect() {
  const requested = effectGroupSelect.value || effectLeds.value.trim();
  const namedGroup = ledGroups.find(group => group.name.toLowerCase() === requested.toLowerCase());
  const leds = namedGroup ? namedGroup.name : compactNumbers([...expandSelection(requested)]);
  if (!leds) return;
  currentEffects.push({ leds, type: effectType.value, speed: clamp(readNumber(effectSpeed.value, 50), 0, 100), brightness: clamp(readNumber(effectBrightness.value, 100) / 100, 0, 1), color: effectColor.value });
  render();
}

function updateEffectSpeed(index, value) { currentEffects[index].speed = clamp(readNumber(value, 0), 0, 100); renderStrip(); }
function updateEffectBrightness(index, value) { currentEffects[index].brightness = clamp(readNumber(value, 0) / 100, 0, 1); renderStrip(); }
function updateEffectColor(index, value) { currentEffects[index].color = value || '#ffffff'; renderStrip(); }

function deleteEffect(index) {
  currentEffects.splice(index, 1);
  render();
}

function deleteStep(index) {
  if (index !== selectedStep) saveCurrentStepDraft();
  playlist[selectedSequence].steps.splice(index, 1);
  selectedStep = -1;
  render();
}

function moveStep(index, direction) {
  saveCurrentStepDraft();
  const steps = playlist[selectedSequence].steps;
  const target = index + direction;
  if (target < 0 || target >= steps.length) return;
  [steps[index], steps[target]] = [steps[target], steps[index]];
  selectedStep = target;
  render();
}

function cloneStep(step) {
  return JSON.parse(JSON.stringify(normalizeStep(step)));
}

function copyStep(index) {
  copiedStep = cloneStep(playlist[selectedSequence].steps[index]);
  statusEl.textContent = `Schritt ${index + 1} kopiert`;
}

function pasteStep(afterIndex = selectedStep) {
  saveCurrentStepDraft();
  if (!copiedStep) return;
  const steps = playlist[selectedSequence].steps;
  const insertAt = afterIndex >= 0 ? afterIndex + 1 : steps.length;
  steps.splice(insertAt, 0, cloneStep(copiedStep));
  selectedStep = insertAt;
  loadStep(insertAt);
  statusEl.textContent = `Schritt eingefuegt`;
}

function addSequence() {
  saveCurrentStepDraft();
  playlist.splice(selectedSequence + 1, 0, { name: 'Neue Sequenz', durationMs: 10000, enabled: true, autoDuration: true, steps: [] });
  selectedSequence += 1;
  selectedStep = -1;
  paintedColors.clear();
  currentEffects = [];
  render();
}

function deleteSequence() {
  saveCurrentStepDraft();
  if (playlist.length <= 1) return;
  playlist.splice(selectedSequence, 1);
  selectedSequence = Math.max(0, selectedSequence - 1);
  selectedStep = -1;
  paintedColors.clear();
  currentEffects = [];
  render();
}

function moveSequence(direction) {
  const target = selectedSequence + direction;
  if (target < 0 || target >= playlist.length) return;
  [playlist[selectedSequence], playlist[target]] = [playlist[target], playlist[selectedSequence]];
  selectedSequence = target;
  render();
}

function play() {
  const firstStep = playlist[0]?.steps[0];
  if (firstStep) renderStrip(firstStep);
  statusEl.textContent = 'Erster gespeicherter Schritt wird angezeigt';
}

function stop(updateStatus = true) {
  if (updateStatus) statusEl.textContent = 'Simulation gestoppt';
  strip.innerHTML = '';
  for (let i = 1; i <= ledCount; i++) {
    const pixel = document.createElement('div');
    pixel.className = 'pixel';
    pixel.textContent = i;
    strip.appendChild(pixel);
  }
}

function saveLocal() {
  saveCurrentStepDraft();
  syncCurrentSequenceMeta();
  localStorage.setItem('rgb-sim-playlist', JSON.stringify({ deviceName, apPassword, ledCount, ledGroups, playlist }));
  statusEl.textContent = 'Im Browser gespeichert';
}

function parseStored(text) {
  const list = [];
  let current = null;
  ledGroups = [];
  deviceName = 'RGB-Sequencer';
  apPassword = '12345678';
  for (const raw of text.split('\n')) {
    const line = raw.trim();
    if (!line) continue;
    if (line.startsWith('#NAME')) {
      deviceName = normalizeDeviceName(line.replace('#NAME', '').trim());
      continue;
    }
    if (line.startsWith('#PASS')) {
      apPassword = normalizePassword(line.replace('#PASS', '').trim());
      continue;
    }
    if (line.startsWith('#COUNT')) {
      ledCount = clamp(parseInt(line.replace('#COUNT', '').trim(), 10) || 50, 1, MAX_LEDS);
      continue;
    }
    if (line.startsWith('#GROUP')) {
      const fields = line.replace('#GROUP', '').trim().split('|');
      if (fields[0] && fields[1]) ledGroups.push({ name: fields[0].trim().slice(0, 24), leds: fields.slice(1).join('|').trim() });
      continue;
    }
    if (line.startsWith('#SEQ')) {
      const body = line.replace('#SEQ', '').trim();
      const [name, duration, enabled, autoDuration] = body.split('|');
      current = { name: name || 'Sequenz', durationMs: parseInt(duration, 10) || 10000, enabled: enabled !== '0', autoDuration: autoDuration === '1', steps: [] };
      list.push(current);
      continue;
    }
    if (!current || line.startsWith('#')) continue;
    const parts = line.split('|');
    if (parts.length >= 2) {
      if (parts.length === 3 && !parts[2].startsWith('RANDOM:') && !parts[2].startsWith('STEP:') && !parts[1].includes(':')) {
        current.steps.push({ durationMs: parseInt(parts[0], 10) || 1000, randomMaxMs: 0, color: `#${parts[1]}`, leds: parts[2] });
        continue;
      }
      const optionIndex = parts.findIndex(part => part.startsWith('RANDOM:'));
      const nameOption = parts.find(part => part.startsWith('STEP:')) || '';
      const brightnessOption = parts.find(part => part.startsWith('BRIGHTNESS:')) || '';
      const firstOptionIndex = parts.findIndex((part, index) => index > 1 && (part.startsWith('RANDOM:') || part.startsWith('STEP:') || part.startsWith('BRIGHTNESS:')));
      const groupText = firstOptionIndex >= 0 ? parts.slice(1, firstOptionIndex).join('|') : parts.slice(1).join('|');
      const groups = groupText.split(';').filter(Boolean);
      const randomMaxMs = optionIndex >= 0 ? clamp(parseInt(parts[optionIndex].replace('RANDOM:', ''), 10) || 0, 0, 60000) : 0;
      current.steps.push({
        name: nameOption ? decodeURIComponent(nameOption.replace('STEP:', '')) : '',
        durationMs: parseInt(parts[0], 10) || 1000,
        randomMaxMs,
        brightness: brightnessOption ? clamp(parseInt(brightnessOption.replace('BRIGHTNESS:', ''), 10), 0, 100) : 100,
        groups: groups.filter(group => !group.startsWith('FX:')).map(group => {
          const sep = group.indexOf(':');
          const colorParts = group.slice(0, sep).split('@');
          return { color: `#${colorParts[0]}`, brightness: colorParts.length > 1 ? clamp(readNumber(colorParts[1], 1), 0, 1) : 1, leds: group.slice(sep + 1) };
        }),
        effects: groups.filter(group => group.startsWith('FX:')).map(group => {
          const fx = group.split(':');
          if (fx.length >= 6) return { type: fx[1] || 'fire', speed: clamp(readNumber(fx[2], 50), 0, 100), color: `#${fx[3] || 'ffffff'}`, brightness: clamp(readNumber(fx[4], 1), 0, 1), leds: fx.slice(5).join(':') || '' };
          return { type: fx[1] || 'fire', speed: clamp(readNumber(fx[2], 50), 0, 100), color: `#${fx[3] || 'ffffff'}`, brightness: 1, leds: fx.slice(4).join(':') || '' };
        })
      });
    }
  }
  list.forEach(seq => seq.steps = (seq.steps || []).map(normalizeStep));
  return ensureDemoSequenceInPlaylist(list.length ? list : defaultPlaylist());
}

function serialize() {
  const body = playlist.map(seq => {
    const duration = seq.autoDuration ? sequenceStepDuration(seq) : Math.max(100, Math.round(seq.durationMs || 10000));
    const header = `#SEQ ${seq.name || 'Sequenz'}|${duration}|${seq.enabled === false ? 0 : 1}|${seq.autoDuration ? 1 : 0}`;
    const lines = seq.steps.map(step => {
      step = normalizeStep(step);
      const colorGroups = step.groups.map(group => `${group.color.replace('#', '').toUpperCase()}@${clamp(Number(group.brightness ?? 1), 0, 1)}:${group.leds || ''}`);
      const effectGroups = (step.effects || []).map(effect => `FX:${effect.type}:${clamp(Number(effect.speed ?? 50), 0, 100)}:${String(effect.color || '#ffffff').replace('#', '').toUpperCase()}:${clamp(Number(effect.brightness ?? 1), 0, 1)}:${effect.leds || ''}`);
      const randomPart = step.randomMaxMs > 0 ? `|RANDOM:${Math.max(0, Math.round(step.randomMaxMs))}` : '';
      const namePart = step.name ? `|STEP:${encodeURIComponent(step.name)}` : '';
      const brightnessPart = `|BRIGHTNESS:${Math.round(clamp(Number(step.brightness ?? 100), 0, 100))}`;
      return `${Math.max(20, Math.round(step.durationMs))}|${[...colorGroups, ...effectGroups].join(';')}${randomPart}${namePart}${brightnessPart}`;
    });
    return [header, ...lines].join('\n');
  }).join('\n\n');
  const groupLines = ledGroups.map(group => `#GROUP ${group.name}|${group.leds}`).join('\n');
  return `#NAME ${normalizeDeviceName(deviceName)}\n#PASS ${normalizePassword(apPassword)}\n#COUNT ${ledCount}\n${groupLines}${groupLines ? '\n' : ''}${body}`;
}

function loadLocal() {
  const saved = localStorage.getItem('rgb-sim-playlist');
  if (saved) {
    const data = JSON.parse(saved);
    deviceName = normalizeDeviceName(data.deviceName || 'RGB-Sequencer');
    apPassword = normalizePassword(data.apPassword || '12345678');
    ledCount = clamp(data.ledCount || 50, 1, MAX_LEDS);
    ledGroups = Array.isArray(data.ledGroups) ? data.ledGroups : [];
    playlist = ensureDemoSequenceInPlaylist(Array.isArray(data.playlist) && data.playlist.length ? data.playlist : defaultPlaylist());
    playlist.forEach(seq => seq.steps = (seq.steps || []).map(step => {
      step = normalizeStep(step);
      if (!Array.isArray(step.effects)) step.effects = [];
      step.effects = step.effects.map(effect => ({ ...effect, speed: clamp(Number(effect.speed ?? 50), 0, 100), color: effect.color || '#ffffff' }));
      return step;
    }));
  } else {
    playlist = defaultPlaylist();
  }
}

function compactSelection() {
  return compactNumbers([...paintedColors.keys()]);
}

function compactNumbers(numbers) {
  const nums = [...numbers].sort((a, b) => a - b);
  const ranges = [];
  for (let i = 0; i < nums.length; i++) {
    const start = nums[i];
    let end = start;
    while (nums[i + 1] === end + 1) end = nums[++i];
    ranges.push(start === end ? `${start}` : `${start}-${end}`);
  }
  return ranges.join(',');
}

function expandNumericSelection(text) {
  const result = new Set();
  for (const part of String(text || '').split(',')) {
    const [a, b] = part.split('-').map(v => parseInt(v, 10));
    if (!Number.isFinite(a)) continue;
    const end = Number.isFinite(b) ? b : a;
    for (let i = Math.min(a, end); i <= Math.max(a, end); i++) {
      if (i >= 1 && i <= ledCount) result.add(i);
    }
  }
  return result;
}

function expandSelection(text) {
  const requested = String(text || '').trim();
  const namedGroup = ledGroups.find(group => group.name.toLowerCase() === requested.toLowerCase());
  return expandNumericSelection(namedGroup ? namedGroup.leds : requested);
}

function secondsToMs(value, fallback) {
  const number = parseFloat(String(value).replace(',', '.'));
  return Math.max(20, Math.round((Number.isFinite(number) ? number : fallback) * 1000));
}

function secondsToOptionalMs(value) {
  const number = parseFloat(String(value).replace(',', '.'));
  if (!Number.isFinite(number) || number <= 0) return 0;
  return Math.min(60000, Math.round(number * 1000));
}

function msToSeconds(ms) {
  if (!ms) return '0';
  return (Math.round(ms / 100) / 10).toString();
}

function clamp(value, min, max) {
  return Math.max(min, Math.min(max, value));
}

function readNumber(value, fallback) {
  const number = parseFloat(String(value).replace(',', '.'));
  return Number.isFinite(number) ? number : fallback;
}

function scaleHexColor(color, brightness) {
  const hex = String(color || '#000000').replace('#', '').padEnd(6, '0');
  const factor = clamp(Number(brightness ?? 1), 0, 1);
  const channel = offset => Math.round(parseInt(hex.slice(offset, offset + 2), 16) * factor).toString(16).padStart(2, '0');
  return `#${channel(0)}${channel(2)}${channel(4)}`;
}

function escapeHtml(value) {
  return String(value).replace(/[&<>"']/g, char => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[char]));
}

loadLocal();
if (playlist[0]?.steps[0]) {
  const firstStep = normalizeStep(playlist[0].steps[0]);
  paintedColors = mapFromGroups(firstStep.groups);
  currentEffects = Array.isArray(firstStep.effects) ? firstStep.effects.map(effect => ({ ...effect, speed: clamp(Number(effect.speed ?? 50), 0, 100), color: effect.color || '#ffffff' })) : [];
  stepColor.value = firstStep.groups[0]?.color || '#ff0000';
  stepSeconds.value = msToSeconds(firstStep.durationMs);
  stepRandomSeconds.value = msToSeconds(firstStep.randomMaxMs || 0);
  stepName.value = firstStep.name || '';
  selectedStep = 0;
}
render();
</script>
</body>
</html>
