<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="980" viewBox="0 0 1600 980">
  <defs>
    <style>
      .bg { fill: #fff; }
      .wire { fill: none; stroke: #111827; stroke-width: 3; stroke-linecap: round; stroke-linejoin: round; }
      .v12 { stroke: #dc2626; stroke-width: 4; }
      .v5 { stroke: #f97316; stroke-width: 4; }
      .gnd { stroke: #111827; stroke-width: 4; }
      .sig { stroke: #2563eb; stroke-width: 3.5; }
      .alt { stroke-dasharray: 9 7; opacity: .82; }
      .box { fill: #f8fafc; stroke: #111827; stroke-width: 3; }
      .module { fill: #eef6ff; stroke: #1e3a8a; stroke-width: 2.5; }
      .optional { fill: #fffbea; stroke: #a16207; stroke-width: 2.5; stroke-dasharray: 9 6; }
      .warn { fill: #fff7ed; stroke: #f97316; stroke-width: 2.5; }
      .label { font-family: Arial, Helvetica, sans-serif; fill: #111827; font-size: 24px; font-weight: 700; }
      .small { font-family: Arial, Helvetica, sans-serif; fill: #1f2937; font-size: 18px; }
      .tiny { font-family: Arial, Helvetica, sans-serif; fill: #374151; font-size: 15px; }
      .pin { font-family: Arial, Helvetica, sans-serif; fill: #111827; font-size: 16px; font-weight: 700; }
      .dot { fill: #111827; }
      .terminal { fill: #fff; stroke: #111827; stroke-width: 2.5; }
    </style>
  </defs>

  <rect class="bg" width="1600" height="980"/>
  <text class="label" x="55" y="55">Schaltplan: Wemos D1 mini mit WS2812B an 5 V</text>
  <text class="small" x="55" y="88">12-V-Eingang wird mit Stepdown auf 5 V / 3 A gewandelt. Diese 5 V versorgen Wemos und LED-Streifen.</text>

  <!-- Rails -->
  <path class="wire v12" d="M315 175 H530"/>
  <path class="wire v5" d="M710 175 H1475"/>
  <path class="wire gnd" d="M315 760 H1475"/>
  <text class="small" x="390" y="155">+12 V Eingang</text>
  <text class="small" x="1270" y="155">+5 V nach Stepdown</text>
  <text class="small" x="1400" y="790">GND</text>

  <!-- 12V input -->
  <rect class="box" x="70" y="120" width="215" height="150" rx="8"/>
  <text class="label" x="110" y="165">12-V-Netzteil</text>
  <text class="small" x="105" y="202">Eingang</text>
  <circle class="terminal" cx="285" cy="175" r="10"/>
  <circle class="terminal" cx="285" cy="760" r="10"/>
  <text class="pin" x="243" y="181">+12V</text>
  <text class="pin" x="242" y="766">GND</text>
  <path class="wire v12" d="M295 175 H315"/>
  <path class="wire gnd" d="M295 760 H315"/>

  <!-- Buck converter -->
  <rect class="module" x="530" y="120" width="250" height="210" rx="8"/>
  <text class="label" x="570" y="165">Stepdown</text>
  <text class="small" x="565" y="200">12 V auf 5 V</text>
  <text class="small" x="565" y="230">mind. 3 A</text>
  <circle class="terminal" cx="530" cy="175" r="9"/>
  <circle class="terminal" cx="530" cy="275" r="9"/>
  <circle class="terminal" cx="780" cy="175" r="9"/>
  <circle class="terminal" cx="780" cy="275" r="9"/>
  <text class="pin" x="546" y="181">IN+</text>
  <text class="pin" x="546" y="281">IN-</text>
  <text class="pin" x="714" y="181">OUT+</text>
  <text class="pin" x="714" y="281">OUT-</text>
  <path class="wire v12" d="M530 175 H315"/>
  <path class="wire gnd" d="M530 275 H455 V760"/>
  <path class="wire v5" d="M789 175 H1475"/>
  <path class="wire gnd" d="M789 275 H835 V760"/>
  <circle class="dot" cx="455" cy="760" r="6"/>
  <circle class="dot" cx="835" cy="760" r="6"/>

  <!-- Wemos -->
  <rect class="module" x="860" y="420" width="270" height="230" rx="8"/>
  <text class="label" x="910" y="465">Wemos D1 mini</text>
  <text class="small" x="905" y="500">ESP8266</text>
  <circle class="terminal" cx="860" cy="535" r="9"/>
  <circle class="terminal" cx="860" cy="600" r="9"/>
  <circle class="terminal" cx="1130" cy="525" r="9"/>
  <text class="pin" x="885" y="541">5V</text>
  <text class="pin" x="885" y="606">G</text>
  <text class="pin" x="1050" y="531">D4 / GPIO2</text>
  <path class="wire v5" d="M835 175 V535 H851"/>
  <path class="wire gnd" d="M835 760 V600 H851"/>
  <circle class="dot" cx="835" cy="175" r="6"/>

  <!-- Optional level shifter -->
  <rect class="optional" x="1220" y="420" width="235" height="205" rx="8"/>
  <text class="label" x="1250" y="462">74AHCT125</text>
  <text class="small" x="1252" y="492">optional, empfohlen</text>
  <circle class="terminal" cx="1220" cy="525" r="9"/>
  <circle class="terminal" cx="1455" cy="525" r="9"/>
  <circle class="terminal" cx="1270" cy="625" r="9"/>
  <circle class="terminal" cx="1340" cy="625" r="9"/>
  <circle class="terminal" cx="1410" cy="625" r="9"/>
  <text class="pin" x="1238" y="531">IN</text>
  <text class="pin" x="1408" y="531">OUT</text>
  <text class="pin" x="1250" y="655">/OE</text>
  <text class="pin" x="1320" y="655">GND</text>
  <text class="pin" x="1397" y="655">VCC</text>
  <path class="wire sig" d="M1139 525 H1211"/>
  <path class="wire gnd" d="M1270 625 V760"/>
  <path class="wire gnd" d="M1340 625 V760"/>
  <path class="wire v5" d="M1410 625 V175"/>
  <circle class="dot" cx="1270" cy="760" r="6"/>
  <circle class="dot" cx="1340" cy="760" r="6"/>
  <circle class="dot" cx="1410" cy="175" r="6"/>

  <!-- Data resistor -->
  <rect class="box" x="1495" y="500" width="90" height="50" rx="4"/>
  <text class="pin" x="1510" y="531">330 Ω</text>
  <text class="tiny" x="1465" y="575">R1 nahe DIN</text>
  <path class="wire sig" d="M1464 525 H1495"/>

  <!-- LED strip -->
  <rect class="box" x="1250" y="105" width="260" height="210" rx="8"/>
  <text class="label" x="1310" y="148">WS2812B</text>
  <text class="small" x="1302" y="182">5 V LED-Streifen</text>
  <circle class="terminal" cx="1250" cy="175" r="9"/>
  <circle class="terminal" cx="1250" cy="245" r="9"/>
  <circle class="terminal" cx="1250" cy="295" r="9"/>
  <text class="pin" x="1270" y="181">5V</text>
  <text class="pin" x="1270" y="251">DIN</text>
  <text class="pin" x="1270" y="301">GND</text>
  <path class="wire v5" d="M1250 175 H1475"/>
  <path class="wire gnd" d="M1250 295 V760"/>
  <path class="wire sig" d="M1585 525 H1590 V245 H1259"/>
  <circle class="dot" cx="1250" cy="175" r="6"/>
  <circle class="dot" cx="1250" cy="760" r="6"/>

  <!-- Capacitor on strip -->
  <text class="small" x="1050" y="255">C1 1000 uF</text>
  <text class="tiny" x="1030" y="280">am Streifenanfang</text>
  <path class="wire v5" d="M1100 175 V330"/>
  <line x1="1068" y1="330" x2="1132" y2="330" stroke="#111827" stroke-width="4"/>
  <line x1="1082" y1="345" x2="1118" y2="345" stroke="#111827" stroke-width="4"/>
  <path class="wire gnd" d="M1100 345 V760"/>
  <text class="pin" x="1140" y="333">+</text>
  <text class="pin" x="1140" y="354">-</text>
  <circle class="dot" cx="1100" cy="175" r="6"/>
  <circle class="dot" cx="1100" cy="760" r="6"/>

  <!-- Decoupling cap -->
  <text class="tiny" x="1210" y="385">C2 100 nF nahe Pegelwandler zwischen VCC und GND</text>
  <path class="wire v5" d="M1515 175 V365"/>
  <line x1="1489" y1="365" x2="1541" y2="365" stroke="#111827" stroke-width="3"/>
  <line x1="1497" y1="379" x2="1533" y2="379" stroke="#111827" stroke-width="3"/>
  <path class="wire gnd" d="M1515 379 V760"/>
  <circle class="dot" cx="1515" cy="175" r="5"/>
  <circle class="dot" cx="1515" cy="760" r="5"/>

  <!-- Direct data alternative -->
  <path class="wire sig alt" d="M1139 575 H1495"/>
  <text class="tiny" x="1160" y="604">Alternative ohne Pegelwandler: D4 direkt ueber R1 an DIN</text>

  <!-- Notes -->
  <rect class="warn" x="70" y="830" width="1450" height="105" rx="8"/>
  <text class="label" x="95" y="870">Hinweise</text>
  <text class="small" x="95" y="903">1. Stepdown vor dem Anschliessen auf exakt 5,0 V einstellen. 2. GND ist ein gemeinsamer Knoten fuer Stepdown, Wemos, Pegelwandler und LED-Streifen.</text>
  <text class="small" x="95" y="930">3. D4/GPIO2 ist Boot-Pin: WS2812B-DIN ist hochohmig genug, trotzdem kein starkes Pulldown an D4 anschliessen.</text>
</svg>
